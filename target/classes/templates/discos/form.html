<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{discos.cadastrar}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site"><img th:src="@{/images/logo.png}" alt="Vinil Mania"/><span>Vinil Mania</span></div>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="pagina-form">
        <div class="card-form">
            <h2 th:text="#{discos.cadastrar}"></h2>

            <form th:action="@{/loja/discos/novo}" th:object="${disco}" method="post">

                <div class="linha-campo">
                    <label th:text="#{discos.titulo.campo}"></label>
                    <input type="text" th:field="*{titulo}"/>
                    <p class="erro-campo" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></p>
                </div>

                <div class="grupo-duas-colunas">
                    <div class="linha-campo">
                        <label th:text="#{discos.artista}"></label>
                        <input type="text" th:field="*{artista}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('artista')}" th:errors="*{artista}"></p>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{discos.gravadora}"></label>
                        <input type="text" th:field="*{gravadora}"/>
                    </div>
                </div>

                <div class="grupo-duas-colunas">
                    <div class="linha-campo">
                        <label th:text="#{discos.ano}"></label>
                        <input type="number" th:field="*{anoLancamento}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('anoLancamento')}" th:errors="*{anoLancamento}"></p>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{discos.genero}"></label>
                        <input type="text" th:field="*{generoMusical}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('generoMusical')}" th:errors="*{generoMusical}"></p>
                    </div>
                </div>

                <div class="linha-campo">
                    <label th:text="#{discos.estado}"></label>
                    <select th:field="*{estadoConservacao}">
                        <option th:each="estado : ${estados}"
                                th:value="${estado}"
                                th:text="${estado}">
                        </option>
                    </select>
                </div>

                <div class="linha-campo">
                    <label th:text="#{discos.descricao}"></label>
                    <textarea th:field="*{descricao}"></textarea>
                </div>

                <div class="linha-campo">
                    <label th:text="#{discos.valor}"></label>
                    <input type="number" step="0.01" th:field="*{valor}"/>
                    <p class="erro-campo" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></p>
                </div>

                <div class="acoes-form">
                    <a th:href="@{/loja/discos}" class="botao-secundario" th:text="#{discos.cancelar}"></a>
                    <button type="submit" class="botao-primario" th:text="#{discos.cadastrar}"></button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
