<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{propostas.minhasTitulo}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </div>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="conteudo">
        <h2 th:text="#{propostas.minhasTitulo}" style="margin-bottom: 20px;"></h2>

        <div th:if="${#lists.isEmpty(propostas)}" class="mensagem-vazia">
            <p th:text="#{propostas.nenhuma}"></p>
        </div>

        <div th:each="proposta : ${propostas}" class="card-form" style="margin-bottom:16px;">
            <p style="font-weight:700; margin-bottom:4px;" th:text="${proposta.disco.titulo}"></p>
            <p style="color:#666; margin-bottom:8px;" th:text="${'R$ ' + proposta.valor + ' — ' + proposta.condicoesPagamento}"></p>
            <p style="font-size:13px; color:#888; margin-bottom:8px;" th:text="${proposta.dataProposta}"></p>
            <span class="badge-status badge-disponivel" style="position:static; display:inline-block;" th:text="#{${'propostas.status.' + proposta.status.name()}}"></span>
        </div>
    </div>

</body>
</html>
