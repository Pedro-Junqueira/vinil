<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{propostas.fazerTitulo}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </div>
    </header>

    <div class="pagina-form">
        <div class="card-form">
            <h2 th:text="#{propostas.fazerTitulo}"></h2>

            <p style="font-weight:600; margin-bottom:2px;" th:text="${disco.titulo}"></p>
            <p style="color:#666; margin-bottom:2px;" th:text="${disco.artista}"></p>
            <p style="font-weight:700; color:#174031; margin-bottom:20px;" th:text="${'R$ ' + disco.valor}"></p>

            <div th:if="${erro}" class="erro-login">
                <span th:text="${erro}"></span>
            </div>

            <form th:action="@{/cliente/propostas/novo}" method="post">
                <input type="hidden" name="discoId" th:value="${disco.id}"/>

                <div class="linha-campo">
                    <label th:text="#{propostas.valor}"></label>
                    <input type="number" step="0.01" name="valor"/>
                </div>

                <div class="linha-campo">
                    <label th:text="#{propostas.condicoes}"></label>
                    <input type="text" name="condicoesPagamento"/>
                </div>

                <div class="acoes-form">
                    <a th:href="@{/discos}" class="botao-secundario" th:text="#{discos.cancelar}"></a>
                    <button type="submit" class="botao-primario" th:text="#{propostas.enviar}"></button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
