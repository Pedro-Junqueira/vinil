<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{propostas.recebidasTitulo}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </div>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="conteudo">
        <h2 th:text="#{propostas.recebidasTitulo}" style="margin-bottom: 20px;"></h2>

        <div th:if="${#lists.isEmpty(propostas)}" class="mensagem-vazia">
            <p th:text="#{propostas.nenhumaRecebida}"></p>
        </div>

        <div th:each="proposta : ${propostas}" class="card-form" style="margin-bottom:16px;">
            <p style="font-weight:700; margin-bottom:4px;" th:text="${proposta.disco.titulo}"></p>
            <p style="color:#666; margin-bottom:4px;" th:text="${proposta.cliente.nome}"></p>
            <p style="color:#666; margin-bottom:8px;" th:text="${'R$ ' + proposta.valor + ' — ' + proposta.condicoesPagamento}"></p>
            <span class="badge-status badge-disponivel" style="position:static; display:inline-block; margin-bottom:16px;" th:text="#{${'propostas.status.' + proposta.status.name()}}"></span>

            <div th:if="${proposta.status.name() == 'ABERTO'}">
                <form th:action="@{/loja/propostas/{id}/aceitar(id=${proposta.id})}" method="post" style="margin-bottom:12px;">
                    <div class="linha-campo">
                        <label th:text="#{propostas.horario}"></label>
                        <input type="text" name="horarioReuniao" placeholder="Ex: 15h00 de 20/06"/>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{propostas.link}"></label>
                        <input type="text" name="linkVideoconferencia" placeholder="Ex: meet.google.com/abc"/>
                    </div>
                    <button type="submit" class="botao-primario" th:text="#{propostas.aceitar}"></button>
                </form>

                <form th:action="@{/loja/propostas/{id}/rejeitar(id=${proposta.id})}" method="post">
                    <div class="linha-campo">
                        <label th:text="#{propostas.contraproposta}"></label>
                        <input type="text" name="contraproposta" placeholder="Ex: R$200, a vista"/>
                    </div>
                    <button type="submit" class="botao-secundario" style="width:100%;" th:text="#{propostas.rejeitar}"></button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
