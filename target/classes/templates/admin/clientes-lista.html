<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.clientesTitulo}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </div>
    </header>

    <div class="conteudo">
        <h2 th:text="#{admin.clientesTitulo}" style="margin-bottom: 20px;"></h2>

        <a th:href="@{/admin/clientes/novo}" class="botao-acao" style="display:inline-block; width:auto; margin-bottom:24px;" th:text="#{admin.clienteNovo}"></a>

        <div th:if="${#lists.isEmpty(clientes)}" class="mensagem-vazia">
            <p th:text="#{admin.nenhumCliente}"></p>
        </div>

        <div th:each="cliente : ${clientes}" class="card-form" style="margin-bottom:16px;">
            <p style="font-weight:700; margin-bottom:4px;" th:text="${cliente.nome}"></p>
            <p style="color:#666; margin-bottom:4px;" th:text="${cliente.cpf}"></p>
            <p style="color:#666; margin-bottom:16px;" th:text="${cliente.email}"></p>

            <div class="acoes-form" style="margin-top:0;">
                <a th:href="@{/admin/clientes/{id}/editar(id=${cliente.id})}" class="botao-secundario" th:text="#{admin.editar}"></a>
                <form th:action="@{/admin/clientes/{id}/deletar(id=${cliente.id})}" method="post" style="flex:1;">
                    <button type="submit" class="botao-primario" style="width:100%; background-color:#a33b2e;" th:text="#{admin.deletar}"></button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
