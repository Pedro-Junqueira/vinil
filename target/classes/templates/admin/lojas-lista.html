<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.lojasTitulo}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </div>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="conteudo">
        <h2 th:text="#{admin.lojasTitulo}" style="margin-bottom: 20px;"></h2>

        <a th:href="@{/admin/lojas/novo}" class="botao-acao" style="display:inline-block; width:auto; margin-bottom:24px;" th:text="#{admin.lojaNova}"></a>

        <div th:if="${#lists.isEmpty(lojas)}" class="mensagem-vazia">
            <p th:text="#{admin.nenhumaLoja}"></p>
        </div>

        <div th:each="loja : ${lojas}" class="card-form" style="margin-bottom:16px;">
            <p style="font-weight:700; margin-bottom:4px;" th:text="${loja.nome}"></p>
            <p style="color:#666; margin-bottom:4px;" th:text="${loja.cnpj}"></p>
            <p style="color:#666; margin-bottom:16px;" th:text="${loja.email}"></p>

            <div class="acoes-form" style="margin-top:0;">
                <a th:href="@{/admin/lojas/{id}/editar(id=${loja.id})}" class="botao-secundario" th:text="#{admin.editar}"></a>
                <form th:action="@{/admin/lojas/{id}/deletar(id=${loja.id})}" method="post" style="flex:1;">
                    <button type="submit" class="botao-primario" style="width:100%; background-color:#a33b2e;" th:text="#{admin.deletar}"></button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
