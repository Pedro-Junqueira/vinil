<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${loja.id == null} ? #{admin.lojaCadastrar} : #{admin.lojaEditar}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <a th:href="@{/discos}" class="logo-site" style="text-decoration:none;">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </a>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="pagina-form">
        <div class="card-form">
            <h2 th:if="${loja.id == null}" th:text="#{admin.lojaCadastrar}"></h2>
            <h2 th:if="${loja.id != null}" th:text="#{admin.lojaEditar}"></h2>

            <form th:action="${loja.id == null} ? @{/admin/lojas/novo} : @{/admin/lojas/{id}/editar(id=${loja.id})}"
                  th:object="${loja}" method="post">

                <div class="linha-campo">
                    <label th:text="#{admin.nome}"></label>
                    <input type="text" th:field="*{nome}"/>
                    <p class="erro-campo" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
                </div>

                <div class="linha-campo">
                    <label th:text="#{admin.cnpj}"></label>
                    <input type="text" id="campo-cnpj" th:field="*{cnpj}"/>
                    <p class="erro-campo" th:if="${#fields.hasErrors('cnpj')}" th:errors="*{cnpj}"></p>
                </div>

                <div class="linha-campo">
                    <label th:text="#{admin.descricao}"></label>
                    <textarea th:field="*{descricao}"></textarea>
                </div>

                <div th:if="${loja.id == null}" class="grupo-duas-colunas">
                    <div class="linha-campo">
                        <label th:text="#{admin.email}"></label>
                        <input type="email" th:field="*{email}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{admin.senha}"></label>
                        <input type="password" th:field="*{senha}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></p>
                    </div>
                </div>

                <div class="acoes-form">
                    <a th:href="@{/admin/lojas}" class="botao-secundario" th:text="#{discos.cancelar}"></a>
                    <button type="submit" class="botao-primario" th:text="#{admin.salvar}"></button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/mascaras.js}"></script>
    <script>
        aplicarMascaraCnpj(document.getElementById("campo-cnpj"));
    </script>

</body>
</html>
