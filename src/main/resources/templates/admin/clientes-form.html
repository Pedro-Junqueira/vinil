<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${cliente.id == null} ? #{admin.clienteCadastrar} : #{admin.clienteEditar}"></title>
</head>
<body>

    <h1 th:if="${cliente.id == null}" th:text="#{admin.clienteCadastrar}"></h1>
    <h1 th:if="${cliente.id != null}" th:text="#{admin.clienteEditar}"></h1>

    <form th:action="${cliente.id == null} ? @{/admin/clientes/novo} : @{/admin/clientes/{id}/editar(id=${cliente.id})}"
          th:object="${cliente}" method="post">

        <label th:text="#{admin.nome}"></label>
        <input type="text" th:field="*{nome}"/>
        <p th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>

        <label th:text="#{admin.cpf}"></label>
        <input type="text" th:field="*{cpf}"/>
        <p th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></p>

        <label th:text="#{admin.telefone}"></label>
        <input type="text" th:field="*{telefone}"/>

        <label th:text="#{admin.sexo}"></label>
        <input type="text" th:field="*{sexo}"/>

        <label th:text="#{admin.dataNascimento}"></label>
        <input type="date" th:field="*{dataNascimento}"/>

        <div th:if="${cliente.id == null}">
            <label th:text="#{admin.email}"></label>
            <input type="email" name="email"/>

            <label th:text="#{admin.senha}"></label>
            <input type="password" name="senha"/>
        </div>

        <button type="submit" th:text="#{admin.salvar}"></button>

    </form>

</body>
</html>
