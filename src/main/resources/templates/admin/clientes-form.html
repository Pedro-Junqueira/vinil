<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${cliente.id == null} ? #{admin.clienteCadastrar} : #{admin.clienteEditar}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <a th:href="@{/discos}" class="logo-site" style="text-decoration:none;">
            <img th:src="@{/images/logo.png}" alt="Vinil Mania"/>
            <span>Vinil Mania</span>
        </a>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="pagina-form">
        <div class="card-form">
            <h2 th:if="${cliente.id == null}" th:text="#{admin.clienteCadastrar}"></h2>
            <h2 th:if="${cliente.id != null}" th:text="#{admin.clienteEditar}"></h2>

            <div th:if="${erroDuplicado}" class="erro-login">
                <p th:text="#{erro.duplicado}"></p>
            </div>

            <form th:action="${cliente.id == null} ? @{/admin/clientes/novo} : @{/admin/clientes/{id}/editar(id=${cliente.id})}"
                  th:object="${cliente}" method="post">

                <div class="linha-campo">
                    <label th:text="#{admin.nome}"></label>
                    <input type="text" th:field="*{nome}"/>
                    <p class="erro-campo" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
                </div>

                <div class="grupo-duas-colunas">
                    <div class="linha-campo">
                        <label th:text="#{admin.cpf}"></label>
                        <input type="text" id="campo-cpf" th:field="*{cpf}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></p>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{admin.telefone}"></label>
                        <input type="text" th:field="*{telefone}"/>
                    </div>
                </div>

                <div class="grupo-duas-colunas">
                    <div class="linha-campo">
                        <label th:text="#{admin.sexo}"></label>
                        <input type="text" th:field="*{sexo}"/>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{admin.dataNascimento}"></label>
                        <input type="date" th:field="*{dataNascimento}"/>
                    </div>
                </div>

                <div th:if="${cliente.id == null}" class="grupo-duas-colunas">
                    <div class="linha-campo">
                        <label th:text="#{admin.email}"></label>
                        <input type="email" th:field="*{email}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    <div class="linha-campo">
                        <label th:text="#{admin.senha}"></label>
                        <input type="password" th:field="*{senha}"/>
                        <p class="erro-campo" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></p>
                    </div>
                </div>

                <div class="acoes-form">
                    <a th:href="@{/admin/clientes}" class="botao-secundario" th:text="#{discos.cancelar}"></a>
                    <button type="submit" class="botao-primario" th:text="#{admin.salvar}"></button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/mascaras.js}"></script>
    <script>
        aplicarMascaraCpf(document.getElementById('campo-cpf'));
    </script>

</body>
</html>
