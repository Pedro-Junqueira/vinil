<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.titulo}"></title>
    <link rel="stylesheet" th:href="@{/css/catalogo.css}"/>
</head>
<body>

    <header class="cabecalho">
        <div class="logo-site"><img th:src="@{/images/logo.png}" alt="Vinil Mania"/><span>Vinil Mania</span></div>
        <div class="idiomas-cabecalho">
            <a href="?lang=pt">PT</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
        </div>
    </header>

    <div class="pagina-login">

        <div class="coluna-login">
            <h2 th:text="#{login.titulo}"></h2>

            <div th:if="${param.error}" class="erro-login">
                <span th:text="#{login.erro}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="campo-login">
                    <label th:text="#{login.email}"></label>
                    <input type="email" name="username"/>
                </div>
                <div class="campo-login">
                    <label th:text="#{login.senha}"></label>
                    <input type="password" name="password"/>
                </div>
                <button type="submit" class="botao-acessar" th:text="#{login.entrar}"></button>
            </form>

            <a th:href="@{/discos}" class="link-discos-publico" th:text="#{login.verSemLogin}"></a>

        </div>

        <div class="divisor-vertical"></div>

        <div class="coluna-login">
            <h2 th:text="#{login.acessoTitulo}"></h2>
            <p class="aviso-cadastro" th:text="#{login.acessoAviso}"></p>
        </div>

    </div>

</body>
</html>
