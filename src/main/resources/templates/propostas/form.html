<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{propostas.fazerTitulo}"></title>
</head>
<body>

    <h1 th:text="#{propostas.fazerTitulo}"></h1>

    <h3 th:text="${disco.titulo}"></h3>
    <p th:text="${disco.artista}"></p>
    <p th:text="${disco.valor}"></p>

    <div th:if="${erro}">
        <p th:text="${erro}"></p>
    </div>

    <form th:action="@{/cliente/propostas/novo}" method="post">
        <input type="hidden" name="discoId" th:value="${disco.id}"/>

        <label th:text="#{propostas.valor}"></label>
        <input type="number" step="0.01" name="valor"/>

        <label th:text="#{propostas.condicoes}"></label>
        <input type="text" name="condicoesPagamento"/>

        <button type="submit" th:text="#{propostas.enviar}"></button>
    </form>

</body>
</html>
